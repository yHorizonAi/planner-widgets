<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GPA Tracker & Grade Calculator</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    background: transparent;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    padding: 12px 0;
  }

  .widget {
    background: linear-gradient(135deg, #eef0fb 0%, #e8e4f5 50%, #dde8f8 100%);
    border-radius: 20px;
    padding: 22px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(180, 180, 230, 0.3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    min-width: 260px;
    max-width: 340px;
    width: 100%;
  }

  .widget::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(220,180,240,0.2) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .sparkles {
    position: absolute;
    font-size: 8px;
    color: rgba(196, 160, 200, 0.5);
  }
  .sparkles.s1 { top: 14px; left: 18px; }
  .sparkles.s2 { top: 14px; right: 18px; }

  .title {
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    color: #6a5a8a;
    margin-bottom: 14px;
  }

  .gpa-display-container {
    position: relative;
    width: 160px;
    height: 95px;
    margin: 0 auto 5px auto;
  }

  .gpa-svg {
    width: 100%;
    height: 100%;
  }

  .arc-bg {
    fill: none;
    stroke: rgba(196, 160, 200, 0.2);
    stroke-width: 8;
    stroke-linecap: round;
  }

  .arc-fill {
    fill: none;
    stroke: url(#lavender-grad);
    stroke-width: 8;
    stroke-linecap: round;
    stroke-dasharray: 220;
    stroke-dashoffset: 220;
    transition: stroke-dashoffset 0.5s ease-out;
  }

  .gpa-text-box {
    position: absolute;
    bottom: 5px;
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .gpa-number {
    font-family: 'Lora', serif;
    font-size: 28px;
    font-weight: 700;
    color: #6a5a8a;
    line-height: 1;
  }

  .gpa-label {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.12em;
    color: #a0a0c0;
    text-transform: uppercase;
    margin-top: 2px;
  }

  .encouragement {
    font-family: 'Lora', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 12px;
    color: #7a5c8a;
    min-height: 18px;
    margin-bottom: 12px;
  }

  .divider {
    height: 1px;
    background: rgba(196,160,200,0.2);
    margin: 12px 0;
  }

  .section-label {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 11px;
    letter-spacing: 0.05em;
    color: #6a5a8a;
    margin-bottom: 10px;
    text-align: left;
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .class-list {
    max-height: 180px;
    overflow-y: auto;
    padding-right: 8px;
    margin-bottom: 12px;
  }

  .class-list {
    scrollbar-width: auto;
    scrollbar-color: rgba(122, 92, 138, 0.55) rgba(196, 160, 200, 0.12);
    -webkit-overflow-scrolling: touch;
  }

  .class-list::-webkit-scrollbar {
    width: 10px;
  }
  .class-list::-webkit-scrollbar-track {
    background: rgba(196, 160, 200, 0.12);
    border-radius: 10px;
  }
  .class-list::-webkit-scrollbar-thumb {
    background: rgba(122, 92, 138, 0.55);
    border-radius: 10px;
    border: 2px solid rgba(238, 240, 251, 0.6);
  }
  .class-list::-webkit-scrollbar-thumb:hover {
    background: rgba(122, 92, 138, 0.8);
  }

  .class-row {
    display: flex;
    align-items: center;
    gap: 8px;
    margin-bottom: 8px;
    animation: fadeIn 0.25s ease-in-out;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .class-input {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 12px;
    border: 1px solid rgba(180, 180, 230, 0.3);
    background: rgba(255, 255, 255, 0.5);
    color: #6a5a8a;
    outline: none;
    flex: 1;
  }

  .class-input::placeholder {
    color: #c0c0d8;
  }

  .class-select {
    font-family: 'Lora', serif;
    font-size: 11px;
    font-weight: 600;
    padding: 5px 8px;
    border-radius: 12px;
    border: 1px solid rgba(180, 180, 230, 0.3);
    background: rgba(255, 255, 255, 0.6);
    color: #7a5c8a;
    outline: none;
    cursor: pointer;
  }

  .delete-btn {
    background: none;
    border: none;
    cursor: pointer;
    font-size: 11px;
    color: rgba(196, 160, 200, 0.7);
    padding: 0 4px;
    font-family: 'Jost', sans-serif;
    transition: color 0.15s;
  }

  .delete-btn:hover {
    color: #c07070;
  }

  .add-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 10px;
    letter-spacing: 0.05em;
    padding: 3px 8px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid rgba(122, 92, 138, 0.3);
    background: rgba(255, 255, 255, 0.6);
    color: #6a5a8a;
    transition: all 0.15s;
  }

  .add-btn:hover {
    background: rgba(122, 92, 138, 0.1);
  }

  .reset-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #a0a0c0;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-top: 4px;
    transition: color 0.15s;
  }

  .reset-btn.confirming {
    color: #c07070;
    font-weight: 500;
    letter-spacing: 0.06em;
  }
</style>
</head>
<body>

<div class="widget">
  <span class="sparkles s1">✦</span>
  <span class="sparkles s2">✦</span>

  <div class="title">GPA Tracker</div>

  <div class="gpa-display-container">
    <svg class="gpa-svg" viewBox="0 0 100 60">
      <defs>
        <linearGradient id="lavender-grad" x1="0%" y1="0%" x2="100%" y2="0%">
          <stop offset="0%" stop-color="#ba9ec7" />
          <stop offset="100%" stop-color="#8ba3de" />
        </linearGradient>
      </defs>
      <path class="arc-bg" d="M 15 50 A 35 35 0 0 1 85 50" />
      <path class="arc-fill" id="gpa-arc" d="M 15 50 A 35 35 0 0 1 85 50" />
    </svg>
    <div class="gpa-text-box">
      <div class="gpa-number" id="gpa-val">0.00</div>
      <div class="gpa-label">Current GPA</div>
    </div>
  </div>

  <div class="encouragement" id="gpa-msg">Add a class to start tracking!</div>

  <div class="divider"></div>

  <div class="section-label">
    <span>▸ Classes & Grades</span>
    <button class="add-btn" onclick="addClassRow()">+ Add Class</button>
  </div>

  <div class="class-list" id="class-container"></div>

  <div class="divider"></div>
  <button class="reset-btn" id="reset-btn" onclick="handleResetClick()">↺ Clear All Classes</button>
</div>

<script>
  const gradeScale = {
    'A': 4.0, 'A-': 3.7,
    'B+': 3.3, 'B': 3.0, 'B-': 2.7,
    'C+': 2.3, 'C': 2.0, 'C-': 1.7,
    'D+': 1.3, 'D': 1.0,
    'F': 0.0
  };

  const messages = [
    { max: 1.9, text: "Every step is progress. Keep pushing forward ✦" },
    { max: 2.9, text: "You're building solid momentum. Keep it up ✦" },
    { max: 3.6, text: "Incredible focus! You are thriving ✦" },
    { max: 4.0, text: "Masterful execution. Absolutely brilliant ✦" }
  ];

  let classes = [];

  function init() {
    const saved = localStorage.getItem('gpa_classes');
    if (saved) {
      classes = JSON.parse(saved);
    } else {
      classes = [
        { id: 1, name: 'Class 1', grade: 'A' },
        { id: 2, name: 'Class 2', grade: 'B+' }
      ];
    }
    renderClasses();
  }

  function save() {
    localStorage.setItem('gpa_classes', JSON.stringify(classes));
  }

  function renderClasses() {
    const container = document.getElementById('class-container');
    container.innerHTML = '';

    classes.forEach(c => {
      const row = document.createElement('div');
      row.className = 'class-row';
      row.innerHTML = `
        <input type="text" class="class-input" value="${c.name}" placeholder="Course name..." onchange="updateName(${c.id}, this.value)">
        <select class="class-select" onchange="updateGrade(${c.id}, this.value)">
          ${Object.keys(gradeScale).map(g => `<option value="${g}" ${c.grade === g ? 'selected' : ''}>${g}</option>`).join('')}
        </select>
        <button class="delete-btn" onclick="removeClassRow(${c.id})" title="Delete class">✕</button>
      `;
      container.appendChild(row);
    });

    calculateGPA();
  }

  function addClassRow() {
    const newId = classes.length > 0 ? Math.max(...classes.map(c => c.id)) + 1 : 1;
    classes.push({
      id: newId,
      name: `Class ${newId}`,
      grade: 'A'
    });
    renderClasses();
    save();
    
    const container = document.getElementById('class-container');
    container.scrollTop = container.scrollHeight;
  }

  function removeClassRow(id) {
    classes = classes.filter(c => c.id !== id);
    renderClasses();
    save();
  }

  function updateName(id, val) {
    const item = classes.find(c => c.id === id);
    if (item) item.name = val;
    save();
  }

  function updateGrade(id, val) {
    const item = classes.find(c => c.id === id);
    if (item) {
      item.grade = val; // Force assignment into master state array
    }
    save();
    calculateGPA(); // Recalculates completely live from the array data
  }

  let resetConfirmTimeout = null;

  function handleResetClick() {
    const btn = document.getElementById('reset-btn');

    if (btn.dataset.confirming === 'true') {
      clearTimeout(resetConfirmTimeout);
      resetTracker();
      btn.dataset.confirming = 'false';
      btn.classList.remove('confirming');
      btn.textContent = '↺ Clear All Classes';
    } else {
      btn.dataset.confirming = 'true';
      btn.classList.add('confirming');
      btn.textContent = 'Tap again to confirm';

      resetConfirmTimeout = setTimeout(() => {
        btn.dataset.confirming = 'false';
        btn.classList.remove('confirming');
        btn.textContent = '↺ Clear All Classes';
      }, 3000);
    }
  }

  function resetTracker() {
    classes = [];
    save();
    renderClasses();
  }

  function calculateGPA() {
    const gpaValEl = document.getElementById('gpa-val');
    const gpaMsgEl = document.getElementById('gpa-msg');
    const arcFill = document.getElementById('gpa-arc');

    if (classes.length === 0) {
      gpaValEl.textContent = "0.00";
      gpaMsgEl.textContent = "Add a class to start tracking! ✦";
      arcFill.style.strokeDashoffset = 220;
      return;
    }

    let totalPoints = 0;
    classes.forEach(c => {
      totalPoints += gradeScale[c.grade];
    });

    const finalGPA = totalPoints / classes.length;
    gpaValEl.textContent = finalGPA.toFixed(2);

    const percentage = finalGPA / 4.0;
    const offsetValue = 220 - (110 * percentage);
    arcFill.style.strokeDashoffset = offsetValue;

    const phrase = messages.find(m => finalGPA <= m.max) || messages[messages.length - 1];
    gpaMsgEl.textContent = phrase.text;
  }

  init();
</script>
</body>
</html>
