<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Breakdown</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,600;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;1,300&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  html, body {
    height: 100%;
    overflow-x: hidden;
    overflow-y: auto;
    background: transparent;
  }

  body {
    display: flex;
    align-items: flex-start;
    justify-content: center;
    font-family: 'Cormorant Garamond', serif;
    padding: 12px 0;
  }

  .widget {
    background: linear-gradient(135deg, #eef0fb 0%, #e8e4f5 50%, #dde8f8 100%);
    border-radius: 20px;
    padding: 18px 28px;
    text-align: center;
    position: relative;
    overflow: hidden;
    border: 1px solid rgba(180, 180, 230, 0.3);
    box-shadow: inset 0 1px 0 rgba(255,255,255,0.8);
    min-width: 260px;
    max-width: 340px;
    width: 100%;
  }

  .widget::before {
    content: '';
    position: absolute;
    top: -40px; right: -40px;
    width: 120px; height: 120px;
    background: radial-gradient(circle, rgba(220,180,240,0.2) 0%, transparent 70%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 0;
  }

  .sparkles {
    position: absolute;
    font-size: 8px;
    color: rgba(196, 160, 200, 0.5);
  }
  .sparkles.s1 { top: 14px; left: 18px; }
  .sparkles.s2 { top: 14px; right: 18px; }

  .title {
    font-family: 'Lora', serif;
    font-weight: 700;
    font-size: 14px;
    letter-spacing: 0.08em;
    color: #6a5a8a;
    margin-bottom: 14px;
  }

  /* --- Task input screen --- */
  .task-input-area {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .task-input {
    font-family: 'Jost', sans-serif;
    font-size: 12px;
    padding: 9px 12px;
    border-radius: 12px;
    border: 1px solid rgba(180, 180, 230, 0.3);
    background: rgba(255, 255, 255, 0.6);
    color: #6a5a8a;
    outline: none;
    text-align: center;
  }

  .task-input::placeholder {
    color: #b0b0d0;
  }

  .start-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.08em;
    padding: 9px 20px;
    border-radius: 20px;
    cursor: pointer;
    border: 1px solid rgba(122, 92, 138, 0.35);
    background: linear-gradient(135deg, rgba(196,160,200,0.25), rgba(180,200,240,0.2));
    color: #6a5a8a;
    transition: all 0.2s;
  }

  .start-btn:hover {
    background: rgba(196,160,200,0.3);
    transform: translateY(-1px);
  }

  .hint {
    font-family: 'Lora', serif;
    font-style: italic;
    font-size: 12px;
    color: #a0a0c0;
    margin-top: 4px;
  }

  /* --- Active breakdown screen --- */
  .task-name {
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 19px;
    letter-spacing: 0.01em;
    margin-bottom: 4px;
    word-break: break-word;
    background: linear-gradient(100deg, #5a3f7a 0%, #5a3f7a 42%, #a98fd1 50%, #5a3f7a 58%, #5a3f7a 100%);
    background-size: 220% 100%;
    -webkit-background-clip: text;
    background-clip: text;
    color: #5a3f7a;
    -webkit-text-fill-color: transparent;
    animation: taskGlassPulse 3.4s ease-in-out infinite;
  }

  @keyframes taskGlassPulse {
    0%   { background-position: 100% 0; }
    50%  { background-position: 0% 0; }
    100% { background-position: 100% 0; }
  }

  .progress-track {
    height: 6px;
    border-radius: 6px;
    background: rgba(196,160,200,0.15);
    margin: 10px 0 14px 0;
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: 6px;
    background: linear-gradient(90deg, #ba9ec7, #8ba3de);
    width: 0%;
    transition: width 0.35s ease-out;
  }

  .progress-label {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 9px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    color: #a0a0c0;
    margin-top: -8px;
    margin-bottom: 14px;
  }

  /* Next-step spotlight: the single actionable card */
  .next-step-box {
    background: rgba(255,255,255,0.65);
    border: 1px solid rgba(122, 92, 138, 0.25);
    border-radius: 14px;
    padding: 14px 16px;
    margin-bottom: 12px;
    text-align: left;
    position: relative;
  }

  .next-step-tag {
    font-family: 'Jost', sans-serif;
    font-weight: 500;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: #8ba3de;
    margin-bottom: 6px;
  }

  .next-step-text {
    font-family: 'Lora', serif;
    font-weight: 600;
    font-size: 14px;
    color: #6a5a8a;
    margin-bottom: 10px;
    line-height: 1.3;
  }

  .next-step-time {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    color: #a0a0c0;
    margin-bottom: 10px;
  }

  .done-step-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 11px;
    letter-spacing: 0.06em;
    padding: 7px 16px;
    border-radius: 16px;
    cursor: pointer;
    border: none;
    background: linear-gradient(135deg, #ba9ec7, #8ba3de);
    color: #fff;
    transition: all 0.2s;
    width: 100%;
  }

  .done-step-btn:hover {
    opacity: 0.9;
    transform: translateY(-1px);
  }

  .all-done-box {
    padding: 14px 0 4px 0;
  }

  .all-done-text {
    font-family: 'Lora', serif;
    font-style: italic;
    font-weight: 700;
    font-size: 13px;
    color: #7a5c8a;
    margin-bottom: 12px;
  }

  /* Steps list (collapsed / manage view) */
  .toggle-list-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.08em;
    color: #a0a0c0;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    margin-bottom: 10px;
  }

  .steps-list {
    max-height: 130px;
    overflow-y: auto;
    padding-right: 6px;
    margin-bottom: 10px;
    text-align: left;
  }

  .steps-list.hidden { display: none; }

  .steps-list {
    scrollbar-width: thin;
    scrollbar-color: rgba(122, 92, 138, 0.4) rgba(196, 160, 200, 0.1);
  }
  .steps-list::-webkit-scrollbar { width: 8px; }
  .steps-list::-webkit-scrollbar-track {
    background: rgba(196, 160, 200, 0.1);
    border-radius: 8px;
  }
  .steps-list::-webkit-scrollbar-thumb {
    background: rgba(122, 92, 138, 0.4);
    border-radius: 8px;
  }

  .step-row {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 5px 0;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
  }

  .step-row.completed .step-row-text {
    text-decoration: line-through;
    color: #c0c0d8;
  }

  .step-row-text {
    flex: 1;
    color: #6a5a8a;
  }

  .step-check {
    width: 14px;
    height: 14px;
    border-radius: 50%;
    border: 1.5px solid rgba(122, 92, 138, 0.4);
    cursor: pointer;
    flex-shrink: 0;
  }

  .step-check.checked {
    background: linear-gradient(135deg, #ba9ec7, #8ba3de);
    border-color: transparent;
  }

  .add-step-row {
    display: flex;
    gap: 6px;
    margin-bottom: 10px;
  }

  .add-step-input {
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    padding: 6px 10px;
    border-radius: 12px;
    border: 1px solid rgba(180, 180, 230, 0.3);
    background: rgba(255, 255, 255, 0.5);
    color: #6a5a8a;
    outline: none;
    flex: 1;
  }

  .add-step-input::placeholder { color: #c0c0d8; }

  .add-step-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 400;
    font-size: 10px;
    padding: 6px 10px;
    border-radius: 10px;
    cursor: pointer;
    border: 1px solid rgba(122, 92, 138, 0.3);
    background: rgba(255, 255, 255, 0.6);
    color: #6a5a8a;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .add-step-btn:hover { background: rgba(122, 92, 138, 0.1); }

  .divider {
    height: 1px;
    background: rgba(196,160,200,0.2);
    margin: 8px 0;
  }

  .reset-btn {
    font-family: 'Jost', sans-serif;
    font-weight: 300;
    font-size: 10px;
    letter-spacing: 0.12em;
    color: #a0a0c0;
    background: none;
    border: none;
    cursor: pointer;
    text-decoration: underline;
    text-underline-offset: 3px;
    transition: color 0.15s;
  }

  .reset-btn.confirming {
    color: #c07070;
    font-weight: 500;
    letter-spacing: 0.06em;
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="widget">
  <span class="sparkles s1">✦</span>
  <span class="sparkles s2">✦</span>

  <!-- SETUP: no task yet -->
  <div id="setup-screen">
    <div class="task-input-area">
      <input type="text" class="task-input" id="task-name-input" placeholder="What's the big task?" maxlength="60">
      <button class="start-btn" onclick="startTask()">Break it down ✦</button>
    </div>
    <div class="hint">Big or vague tasks feel harder to start.<br>Splitting it into small steps helps.</div>
  </div>

  <!-- ACTIVE: task exists -->
  <div id="active-screen" class="hidden">
    <div class="task-name" id="active-task-name"></div>

    <div class="progress-track"><div class="progress-fill" id="progress-fill"></div></div>
    <div class="progress-label" id="progress-label">0 of 0 steps</div>

    <!-- Spotlight: only the next step is emphasized -->
    <div id="next-step-box" class="next-step-box hidden">
      <div class="next-step-tag">Just start here →</div>
      <div class="next-step-text" id="next-step-text"></div>
      <button class="done-step-btn" onclick="completeNextStep()">Done, next step ✓</button>
    </div>

    <div id="all-done-box" class="all-done-box hidden">
      <div class="all-done-text">Every step done. That's the whole task ✦</div>
    </div>

    <div id="no-steps-box" class="hidden">
      <div class="hint" style="margin-bottom:10px;">Add a few small steps below to begin.</div>
    </div>

    <button class="toggle-list-btn" id="toggle-list-btn" onclick="toggleList()">▸ View / edit all steps</button>

    <div class="steps-list hidden" id="steps-list"></div>

    <div class="add-step-row">
      <input type="text" class="add-step-input" id="new-step-input" placeholder="Add a small step..." maxlength="60" onkeydown="if(event.key==='Enter') addStep()">
      <button class="add-step-btn" onclick="addStep()">+ Add</button>
    </div>

    <div class="divider"></div>
    <button class="reset-btn" id="reset-btn" onclick="handleResetClick()">↺ Start a new task</button>
  </div>
</div>

<script>
  let task = null; // { name, steps: [{id, text, done}] }

  function init() {
    const saved = localStorage.getItem('task_breakdown');
    if (saved) {
      task = JSON.parse(saved);
      showActive();
    }
  }

  function save() {
    localStorage.setItem('task_breakdown', JSON.stringify(task));
  }

  function startTask() {
    const name = document.getElementById('task-name-input').value.trim();
    if (!name) return;
    task = { name, steps: [] };
    save();
    showActive();
  }

  function showActive() {
    document.getElementById('setup-screen').classList.add('hidden');
    document.getElementById('active-screen').classList.remove('hidden');
    document.getElementById('active-task-name').textContent = task.name;
    render();
  }

  function addStep() {
    const input = document.getElementById('new-step-input');
    const val = input.value.trim();
    if (!val) return;
    const newId = task.steps.length > 0 ? Math.max(...task.steps.map(s => s.id)) + 1 : 1;
    task.steps.push({ id: newId, text: val, done: false });
    input.value = '';
    save();
    render();
  }

  function toggleStepDirect(id) {
    const step = task.steps.find(s => s.id === id);
    if (step) step.done = !step.done;
    save();
    render();
  }

  function completeNextStep() {
    const next = task.steps.find(s => !s.done);
    if (next) {
      next.done = true;
      save();
      render();
    }
  }

  function removeStep(id) {
    task.steps = task.steps.filter(s => s.id !== id);
    save();
    render();
  }

  function toggleList() {
    const list = document.getElementById('steps-list');
    const btn = document.getElementById('toggle-list-btn');
    const isHidden = list.classList.contains('hidden');
    list.classList.toggle('hidden');
    btn.textContent = isHidden ? '▾ Hide all steps' : '▸ View / edit all steps';
  }

  function render() {
    const total = task.steps.length;
    const doneCount = task.steps.filter(s => s.done).length;
    const next = task.steps.find(s => !s.done);

    document.getElementById('progress-fill').style.width = total > 0 ? `${(doneCount / total) * 100}%` : '0%';
    document.getElementById('progress-label').textContent = total > 0 ? `${doneCount} of ${total} steps` : 'No steps yet';

    document.getElementById('next-step-box').classList.toggle('hidden', !(total > 0 && next));
    document.getElementById('all-done-box').classList.toggle('hidden', !(total > 0 && !next));
    document.getElementById('no-steps-box').classList.toggle('hidden', total > 0);

    if (next) document.getElementById('next-step-text').textContent = next.text;

    const listEl = document.getElementById('steps-list');
    listEl.innerHTML = '';
    task.steps.forEach(s => {
      const row = document.createElement('div');
      row.className = 'step-row' + (s.done ? ' completed' : '');
      row.innerHTML = `
        <div class="step-check ${s.done ? 'checked' : ''}" onclick="toggleStepDirect(${s.id})"></div>
        <div class="step-row-text">${s.text}</div>
        <button class="delete-btn" style="background:none;border:none;cursor:pointer;font-size:11px;color:rgba(196,160,200,0.7);font-family:'Jost',sans-serif;" onclick="removeStep(${s.id})">✕</button>
      `;
      listEl.appendChild(row);
    });
  }

  let resetConfirmTimeout = null;

  function handleResetClick() {
    const btn = document.getElementById('reset-btn');
    if (btn.dataset.confirming === 'true') {
      clearTimeout(resetConfirmTimeout);
      resetTask();
      btn.dataset.confirming = 'false';
      btn.classList.remove('confirming');
      btn.textContent = '↺ Start a new task';
    } else {
      btn.dataset.confirming = 'true';
      btn.classList.add('confirming');
      btn.textContent = 'Tap again to confirm';
      resetConfirmTimeout = setTimeout(() => {
        btn.dataset.confirming = 'false';
        btn.classList.remove('confirming');
        btn.textContent = '↺ Start a new task';
      }, 3000);
    }
  }

  function resetTask() {
    task = null;
    localStorage.removeItem('task_breakdown');
    document.getElementById('task-name-input').value = '';
    document.getElementById('active-screen').classList.add('hidden');
    document.getElementById('setup-screen').classList.remove('hidden');
  }

  init();
</script>
</body>
</html>
